‚Äèname: VPS
‚Äèon:
‚Äè  workflow_dispatch:
‚Äèjobs:
‚Äè  secure-vps:
‚Äè    runs-on: ubuntu-latest
‚Äè    timeout-minutes: 360
‚Äè    steps:
‚Äè      - name: Install & Configure SSH
‚Äè        run: |
‚Äè          sudo apt update -y
‚Äè          sudo apt install -y openssh-server
‚Äè          sudo systemctl enable ssh
‚Äè          sudo systemctl start ssh
‚Äè          echo "root:admin@123" | sudo chpasswd
‚Äè          echo "PermitRootLogin yes" | sudo tee -a /etc/ssh/sshd_config
‚Äè          sudo service ssh restart
‚Äè          echo "‚úÖ SSH user: root | pass: admin@123"
‚Äè
‚Äè      - name: Install Tailscale
‚Äè        run: |
‚Äè          curl -fsSL https://tailscale.com/install.sh | sh
‚Äè          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=vps {{ github.run_id }}
‚Äè          tsIP=$(tailscale ip -4 | head -n 1)
‚Äè          echo "TAILSCALE_IP=${tsIP}" >> $GITHUB_ENV
‚Äè          echo "‚úÖ Tailscale IP: ${tsIP}"
‚Äè
‚Äè      - name: Verify SSH Access
‚Äè        run: |
‚Äè          echo "Tailscale VPS ready!"
‚Äè          echo "IP: ${{ env.TAILSCALE_IP }}"
‚Äè          echo "User: root"
‚Äè          echo "Pass: admin@123"
‚Äè
‚Äè      - name: Keep VPS Alive
‚Äè        run: |
‚Äè          while true; do
‚Äè            echo "[$(date)] VPS running..."
‚Äè            sleep 300
‚Äè          done
